# LiteLLM Proxy config — example for use behind the Overlaat queue-proxy.
#
# WHAT OVERLAAT READS FROM THIS FILE:
# The queue-proxy parses this LiteLLM config for the per-model cap — the
# `max_parallel_requests` integer under each model's `litellm_params`. That
# integer is the per-model concurrency cap: the number of requests Overlaat will
# let through to the backend concurrently before the rest WAIT in a queue
# (instead of being rejected with a 429). With the cost-weighted scheduler (on by
# default; see docs/COST-SCHEDULER.md) it also reads two OPTIONAL `model_info`
# keys per model: `overlaat_cost` (explicit pool-fraction cost override; default
# is 1/cap) and `overlaat_pool` (the named resource pool the model is admitted
# against; default `default`). A further OPTIONAL `model_info` key,
# `overlaat_abort_on_disconnect` (bool, default `true`), governs the client-disconnect
# path: `true` releases the slot the instant the client disconnects; `false` holds the
# slot until the upstream drains, for single-stream engines with no abort path (#28).
# A further OPTIONAL `model_info` key, `overlaat_max_prompt_tokens` (positive int,
# default unset = no ceiling), rejects a request whose estimated prompt exceeds it at
# admission with HTTP 413 — before any slot or budget is taken — so no caller can hand
# the runtime a single job too large to process healthily (#30).
# It also reads an OPTIONAL top-level `overlaat.pools`
# section that declares each pool's `budget` and `exclusive` flag (see the bottom
# of this file). The deprecated `overlaat_slot` key is still accepted as a LEGACY
# ALIAS: `overlaat_slot: NAME` is treated as `overlaat_pool: NAME` with that pool
# auto-marked `exclusive: true`, so old swap-slot configs keep working unchanged.
# Everything else here (api_base, routing, master_key, ...) is LiteLLM's own
# concern; the proxy does not interpret it. So: this file is the single source of
# truth for the caps, pools, and scheduler costs, living next to the model they
# govern. (Per-key priority is NOT here — it comes from the LiteLLM key metadata
# field `overlaat_priority`; see docs/COST-SCHEDULER.md §4c.)
#
# The cap is NOT a tuning knob you invent in isolation — it is DERIVED from the
# backend's real concurrency capacity (engine process count, server
# `--parallel`-style flags, GPU residency limits). If you change a cap here,
# also change the backend that actually serves it, or the two drift apart and
# the queue will either starve a capable backend or oversubscribe a serial one.
#
# Default config path is `./litellm-config.yaml`; override with an env var
# (e.g. OVERLAAT_LITELLM_CONFIG) if you keep it elsewhere. Secrets come from an
# env-file (default `./overlaat.env`), never from this file.

model_list:

  # ─── Example 1: a chat model behind Ollama ────────────────────────────────
  # `model_name` is what the consumer asks for; `litellm_params.model` is what
  # the backend receives. The cap below is what the queue-proxy reads as this
  # model's per-model semaphore: how many of these requests may be in flight at
  # the backend at once. Here it is DERIVED from the backend's own parallelism
  # setting (e.g. an Ollama server started with NUM_PARALLEL=4). Keep the two in
  # lockstep: bump one, bump the other.
  - model_name: chat-model
    litellm_params:
      model: ollama_chat/your-chat-model
      api_base: http://127.0.0.1:11434
      max_parallel_requests: 4   # ← per-model semaphore cap read by the queue-proxy. Matches the backend's parallelism (NUM_PARALLEL=4).
      # `think` is an Ollama extension passed through via extra_body; harmless
      # to omit. Shown only to illustrate that LiteLLM forwards extra fields.
      extra_body: {"think": false}

  # ─── Example 2: an embeddings model ───────────────────────────────────────
  # Embeddings are short and cheap; a modest cap is plenty. The cap is still the
  # queue-proxy semaphore — requests beyond it WAIT in FIFO rather than fail.
  - model_name: embeddings-model
    litellm_params:
      model: openai/your-embeddings-model
      api_base: http://127.0.0.1:8085/v1
      api_key: dummy
      max_parallel_requests: 2   # ← per-model semaphore cap read by the queue-proxy.
    model_info:
      # A SEPARATE resource pool with its own budget → never blocked by the swap
      # engine's fat-slot pool (#11 cross-backend isolation). cost = 1/cap = 0.5.
      overlaat_pool: embeddings

  # ─── Example 3: a rerank-style cross-encoder (model-a) ────────────────────
  # A second-stage reranker (cross-encoder) after a first-stage retrieval. The
  # provider POSTs a Cohere-schema {query, documents, ...} to {api_base}/rerank;
  # `model_info.mode: rerank` routes it via LiteLLM's /rerank endpoint.
  #
  # cap=6 here illustrates a deliberate choice: the backend is a single-process
  # GPU server with no real parallelism — the 6 requests are ultimately queued
  # at the GPU, NOT served simultaneously. So why a cap above 1? Because a
  # GENEROUS semaphore keeps many short interactive rerank calls from
  # head-of-line blocking each other behind one slow large-batch call. The cap
  # is a FAIRNESS/admission knob here, not a literal "this many run at once"
  # claim. Set it to reflect the behaviour you want at the queue, then size the
  # backend to match.
  - model_name: model-a
    litellm_params:
      model: your-rerank-provider/your-reranker
      api_base: http://127.0.0.1:8086
      max_parallel_requests: 6   # ← per-model semaphore cap read by the queue-proxy. Generous on purpose to avoid head-of-line blocking; see comment above.
    model_info:
      mode: rerank
      # overlaat_cost: <float> — OPTIONAL explicit GPU-fraction cost for the
      # cost-weighted scheduler (docs/COST-SCHEDULER.md). Overrides the default
      # cost = 1/max_parallel_requests. Use it when 1/cap mis-states a model's
      # real GPU footprint — e.g. here the cap is a generous FAIRNESS knob (6),
      # but the backend is one single-stream GPU server, so the honest budget
      # cost of a run is ~1.0, not 1/6. Without this line the scheduler would
      # think six of these only fill 1/6 of the GPU each.
      overlaat_cost: 1.0

  # ─── Example 4: a swap-on-demand EXCLUSIVE pool (model-b, model-c) ─────────
  # Several large models behind a mutex where only ONE is resident at a time and
  # loading another evicts the current one (the swap-slot tracked by model_loads).
  # Model this as an EXCLUSIVE resource pool: assign every member the SAME
  # `overlaat_pool` name and declare that pool `exclusive: true` in the
  # `overlaat.pools` section below. Exclusivity is a HARD MUTEX on the distinct
  # MEMBER: at most one member id may be active (in_flight > 0) at a time. The
  # resident member's own cap + the pool budget then govern how many of ITS
  # streams run concurrently — so cost is the honest 1/cap, NOT a forced 1.0.
  #
  # model-b below is a cap-2 dual-engine member: its cost is 1/2 = 0.5, and while
  # it is resident BOTH its streams run (used → 1.0 fills the pool). model-c is a
  # single-engine member (cap 1, cost 1.0), mutually exclusive with model-b.
  # Note the 0.5 + 0.5 TRAP this prevents: with model-b resident at used 0.5 there
  # is 0.5 of budget headroom, but a model-c run is STILL rejected (wait_reason
  # `exclusive`) because it is a DIFFERENT member — only when model-b fully drains
  # does the mutex hand off to model-c. See docs/COST-SCHEDULER.md §4b.
  - model_name: model-b
    litellm_params:
      model: your-large-provider/large-model-b
      api_base: http://127.0.0.1:8087
      max_parallel_requests: 2
    model_info:
      overlaat_pool: fat-slot   # ← exclusive pool; cost = 1/cap = 0.5, runs 2 streams while resident

  - model_name: model-c
    litellm_params:
      model: your-large-provider/large-model-c
      api_base: http://127.0.0.1:8088
      max_parallel_requests: 1
    model_info:
      overlaat_pool: fat-slot   # ← same pool → mutually exclusive with model-b (cost = 1/cap = 1.0)
      overlaat_abort_on_disconnect: false   # single-stream engine, no abort API: hold the slot until upstream drains on client disconnect (#28)
      # overlaat_max_prompt_tokens: 8000    # OPTIONAL: reject prompts estimated >8k tokens with 413 before admission; callers must chunk (#30)
      # Legacy: `overlaat_slot: fat-slot` is still accepted here and means the
      # same thing (overlaat_pool: fat-slot + auto exclusive: true).

  # ─── Illustrative note: a single-stream engine ────────────────────────────
  # For a backend that is ONE large model on ONE engine process that does not
  # parallelize internally (a "single-stream engine"), the honest cap is 1: a
  # cap of 1 gives clean FIFO through the queue-proxy with no head-of-line
  # surprises, because the engine truly serves one request at a time. If you run
  # N such engines behind a round-robin wrapper, the cap is N (the parallelism
  # comes from the process count, not from any one engine). The cap must always
  # move together with whatever fronts those engines.

# ─── Overlaat resource pools (OPTIONAL) ────────────────────────────────────────
# Read ONLY by the Overlaat queue-proxy (LiteLLM ignores this top-level key). A
# pool is the unit of admission: each model is assigned to exactly one pool (via
# `model_info.overlaat_pool`, default `default`), and admission is cost-weighted
# against THAT pool's own `budget` — so a pool blocked on budget never idles a
# DIFFERENT pool (#11 cross-backend isolation). Declare a pool here only to set
# its `budget` (default = OVERLAAT_BUDGET) or mark it `exclusive`. A pool a model
# references but does not declare is auto-created (non-exclusive, OVERLAAT_BUDGET)
# and logged at startup.
#
# `exclusive: true` makes the pool a HARD MUTEX over its distinct members: at most
# one member id may be active at a time; the resident member's cap + this budget
# govern how many of its streams run. This REPLACES the old forced-1.0 fat-slot
# cost hack with honest 1/cap costs (#12). `overlaat_slot: NAME` on a model is the
# deprecated alias that auto-creates `NAME` as an exclusive pool.
#
# `heavy_max` controls how much of the pool a single prompt-size-weighted request
# may consume (#18): `leave_room` (default) caps a heavy prompt's cost at
# `budget - base_cost` so one more light call always fits; `full_pool` lets a giant
# prompt take the whole pool and run alone (batch-job intent). Prompt-size weighting
# itself is configured globally via OVERLAAT_PROMPT_WEIGHT_TIERS.
overlaat:
  pools:
    default:            # implicit; declare only to override its budget
      budget: 1.0       # default = OVERLAAT_BUDGET
      heavy_max: leave_room   # default; protects the interactive fast lane (#18)
    fat-slot:
      budget: 1.0
      exclusive: true   # hard mutex: only ONE distinct member active at a time
    embeddings:
      budget: 1.0       # its own budget → isolated from the swap engine (#11)
    batch:
      budget: 1.0
      heavy_max: full_pool    # a huge prompt may consume the whole pool, alone (#18)

# ─── Routing ──────────────────────────────────────────────────────────────────
# NO cross-model fallbacks (deliberate). Silent degradation to a different or
# simpler model is undesirable: the consumer asked for a SPECIFIC model and must
# either get that model or see a clean error — not quietly receive a different
# quality. The orchestration layer (the harness/caller) decides what to do on
# failure, not this gateway. LiteLLM fallback is meant for redundant EQUIVALENT
# deployments (same model, multiple keys/regions), which is not this setup.
router_settings:
  num_retries: 1
  # TIMEOUT LAYERING (#24): the AUTHORITATIVE total per-request deadline is the
  # inference ENGINE's own `--timeout` (operator deployment) — it is the only layer
  # that can evict a stalled/runaway generation GPU-side. Keep the engine --timeout
  # the SMALLEST so it fires first; this LiteLLM *total* timeout and the queue-proxy's
  # INTER-BYTE read-timeout (OVERLAAT_UPSTREAM_READ_TIMEOUT, default 300s) both sit
  # ABOVE the engine deadline. Those two measure different things (a total deadline
  # vs a between-bytes gap), so they need no ordering with EACH OTHER — e.g. engine
  # ~240s, this 1200s total, proxy read 300s inter-byte are all mutually consistent.
  timeout: 1200   # Large-context synthesis (long prefill) under contention can run past 600s; 1200s gives headroom but stays bounded.

# ─── General ──────────────────────────────────────────────────────────────────
general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL          # Postgres; the same DB Overlaat writes its lifecycle events to.
  store_model_in_db: false                       # this config file stays authoritative
  ui_username: admin
  ui_password: os.environ/LITELLM_UI_PW

litellm_settings:
  drop_params: true   # ignore unknown request fields
  # The prometheus callback exposes /metrics with litellm_request_in_progress,
  # litellm_request_total_tokens, etc. — useful for in-flight tracking, since
  # LiteLLM's own SpendLogs only writes on completion (and so misses queued and
  # client-abandoned calls — which is exactly why Overlaat emits its own
  # one-event-per-request lifecycle row to Postgres instead).
  callbacks: ["prometheus"]
  require_auth_for_metrics_endpoint: false   # loopback-only; network ACL is the auth layer
  set_verbose: false
  request_timeout: 1200   # keep in sync with router_settings.timeout (still above the engine --timeout; see the layering note there)
