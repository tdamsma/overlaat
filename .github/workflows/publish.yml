name: Publish to PyPI

# Publishes on a GitHub Release. Uses PyPI Trusted Publishing (OIDC) — no API
# token stored. One-time setup on PyPI: add a trusted publisher for project
# "overlaat" pointing at owner tdamsma, repo overlaat, workflow publish.yml,
# environment "pypi". https://docs.pypi.org/trusted-publishers/
on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          python -m pip install --upgrade pip build
          python -m build
      - run: |
          pip install twine
          twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # required for trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
