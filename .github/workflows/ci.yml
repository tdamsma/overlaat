name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install linter
        run: pip install ruff
      - name: Lint with ruff
        run: ruff check .

  test:
    needs: [lint]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0   # hatch-vcs needs full history + tags to compute the version
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run tests
        run: pytest

  build:
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0   # hatch-vcs needs full history + tags to compute the version
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build distributions
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          twine check dist/*
      - uses: actions/upload-artifact@v6
        with:
          name: dist
          path: dist/*

  smoke-install:
    name: Wheel install smoke test
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: dist
          path: dist
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
      - name: Install built wheel into a fresh venv
        run: |
          uv venv
          uv pip install dist/*.whl
      - name: Import package and key submodules
        run: |
          uv run python -c "import overlaat, overlaat.queue_proxy, overlaat.usage_api, overlaat.metrics_db"

  release:
    name: Release
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    needs: [lint, test, build]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write       # trusted publishing to PyPI (OIDC)
      contents: write       # create/update the GitHub Release
      attestations: write   # build provenance attestation
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: dist
          path: dist
      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: 'dist/*'
      - name: Publish to PyPI
        if: startsWith(github.ref, 'refs/tags/')
        uses: pypa/gh-action-pypi-publish@release/v1
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          fail_on_unmatched_files: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') }}
